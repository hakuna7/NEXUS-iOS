name: NEXUS
options:
  bundleIdPrefix: com.hakuna7
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  NEXUS:
    type: application
    platform: iOS
    sources:
      - NEXUS
    info:
      path: NEXUS/Info.plist
      properties:
        CFBundleDisplayName: NEXUS
        LSRequiresIPhoneOS: true
        NSCameraUsageDescription: "用于 AR 视觉扫描、文字识别和隐私打码。"
        NSPhotoLibraryUsageDescription: "用于选择需要隐私打码的图片。"
        NSPhotoLibraryAddUsageDescription: "用于保存完成隐私打码的图片。"
        NSLocalNetworkUsageDescription: "用于连接你自己的 Windows 电脑并发送遥控指令。"
        NSBonjourServices:
          - _nexus-remote._tcp
        UIBackgroundModes:
          - audio
          - voip
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hakuna7.NEXUS
        PRODUCT_NAME: NEXUS
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: NEXUS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: NEXUSBroadcast
        embed: true
  NEXUSBroadcast:
    type: app-extension
    platform: iOS
    sources:
      - BroadcastExtension
    info:
      path: BroadcastExtension/Info.plist
      properties:
        CFBundleDisplayName: "NEXUS 屏幕识别"
        NSExtension:
          NSExtensionAttributes:
            RPBroadcastProcessMode: RPBroadcastProcessModeSampleBuffer
          NSExtensionPointIdentifier: com.apple.broadcast-services-upload
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).SampleHandler"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hakuna7.NEXUS.Broadcast
        PRODUCT_NAME: NEXUSBroadcast
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BroadcastExtension/Info.plist
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
schemes:
  NEXUS:
    build:
      targets:
        NEXUS: all
        NEXUSBroadcast: all
    run:
      config: Debug
    archive:
      config: Release
