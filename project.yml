name: NEXUS
options:
  bundleIdPrefix: com.hakuna7
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  NEXUS:
    type: application
    platform: iOS
    sources:
      - NEXUS
    info:
      path: NEXUS/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hakuna7.NEXUS
        PRODUCT_NAME: NEXUS
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: NEXUS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: NEXUSBroadcast
        embed: true
  NEXUSBroadcast:
    type: app-extension
    platform: iOS
    sources:
      - BroadcastExtension
    info:
      path: BroadcastExtension/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hakuna7.NEXUS.Broadcast
        PRODUCT_NAME: NEXUSBroadcast
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BroadcastExtension/Info.plist
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
schemes:
  NEXUS:
    build:
      targets:
        NEXUS: all
        NEXUSBroadcast: all
    run:
      config: Debug
    archive:
      config: Release
